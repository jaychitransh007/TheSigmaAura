      FabricTexture:         [smooth, sheen, embroidered]
      ColorValue:            [mid, dark]
      EmbellishmentLevel:    [subtle, moderate]
    avoid:
      FormalityLevel:        [casual, ceremonial]
      OccasionFit:           [traditional]
    notes: >
      Established couple's evening. Slightly more relaxed than first
      date. Anarkali-fitted saree, statement dress, kurta + slim
      trouser combo.

  anniversary_dinner:
    archetype: dating
    formality: semi_formal
    time: evening
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [semi_formal, formal]
      OccasionFit:           [semi_formal, formal]
      TimeOfDay:             [evening]
      FabricTexture:         [smooth, sheen, embroidered]
      ColorValue:            [mid, dark, very_dark]
      EmbellishmentLevel:    [moderate]
    avoid:
      FormalityLevel:        [casual]
      OccasionFit:           [casual, very_casual]
    notes: >
      Milestone dinner. Polished, intentional. Silk saree, sheath dress,
      tailored bandhgala. Slightly more dressed than date_night.


