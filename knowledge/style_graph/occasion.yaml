    notes: >
      Urban Indian Christmas. Western-leaning: structured dress, sequin
      detailing, festive sweater + skirt. For Indian families: light
      anarkali in red/green/cream, traditional kurta. Mid-formality.

  dussehra:
    archetype: festive
    formality: smart_casual
    time: daytime
    seasons: [autumn]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive, daily]
      EmbellishmentLevel:    [subtle, moderate]
    avoid:
      OccasionFit:           [casual, very_casual]
    notes: >
      Lighter festive than Diwali. Cotton-silk kurta, light anarkali,
      casual-festive saree, bandi over kurta.

  festival_lunch:
    archetype: festive
    formality: smart_casual
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
