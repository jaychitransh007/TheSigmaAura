      OccasionFit:           [smart_casual, semi_formal, festive]
      EmbellishmentLevel:    [moderate]
      EmbellishmentType:     [embroidery, beading]
      FabricTexture:         [embroidered, sheen]
    avoid:
      FormalityLevel:        [casual, ceremonial]
      EmbellishmentLevel:    [statement]
    notes: >
      Indian women's social gathering — festive but not ceremonial.
      Embroidered anarkali, designer saree, statement kurta-set.
      Statement jewellery normal — kitty parties are about showing
