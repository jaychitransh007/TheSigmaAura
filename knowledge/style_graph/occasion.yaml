      OccasionSignal:        [festive, daily]
      EmbellishmentLevel:    [subtle, moderate]
    avoid:
      OccasionFit:           [casual]
      EmbellishmentLevel:    [statement]
    notes: >
      Generic family festival lunch — Pongal, Onam, Janmashtami, etc.
      Daytime, cotton + light embroidery, regional traditional dress.


# ─────────────────────────────────────────────────────────────────────────
# WEDDING CYCLE (wedding_vibes archetype)
# ─────────────────────────────────────────────────────────────────────────

  roka:
    archetype: wedding_vibes
    formality: semi_formal
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal]
      OccasionFit:           [smart_casual, semi_formal, traditional]
      OccasionSignal:        [festive, daily]
      EmbellishmentLevel:    [subtle, moderate]
      EmbellishmentType:     [embroidery, beading]
      FabricTexture:         [embroidered, sheen]
      ColorSaturation:       [medium, high]
    avoid:
      FormalityLevel:        [casual, ceremonial]
      EmbellishmentLevel:    [statement]                    # save for later events
    notes: >
      Engagement-engagement (informal proposal acceptance). Light
      pastels or warm tones. Female: pastel anarkali, embroidered
      saree, kurta with light embroidery. Male: sherwani-lite, kurta-
      pyjama with bandi. Lower than wedding ceremony in embellishment.

  sagai_engagement:
    archetype: wedding_vibes
    formality: ceremonial
    time: evening
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [semi_formal, formal, ceremonial]
      FormalitySignalStrength: [high, very_high]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive, evening]
      TimeOfDay:             [evening]
      FabricTexture:         [embroidered, sheen, metallic]
      FabricWeight:          [medium, heavy]
      EmbellishmentLevel:    [moderate, heavy, statement]
      EmbellishmentType:     [embroidery, beading, sequins, mirror_work]
      ColorValue:            [mid, dark, very_dark]
      ColorSaturation:       [high, very_high]
    avoid:
      FormalityLevel:        [casual, smart_casual]
      OccasionFit:           [casual, workwear]
      EmbellishmentLevel:    [none, minimal]
    notes: >
      Formal engagement / ring ceremony. Statement outfit. Heavy
      lehenga, embellished saree, sharara / gharara, fully embroidered
      sherwani for groom. Antique gold heavy jewellery.

  haldi:
    archetype: wedding_vibes
    formality: smart_casual
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive, daily]
      TimeOfDay:             [day]
      FabricTexture:         [smooth, embroidered]
      EmbellishmentLevel:    [subtle, moderate]
      ColorTemperature:      [warm]
      PrimaryColor:          [yellow, mustard, marigold, ochre]
    avoid:
      FormalityLevel:        [casual, ceremonial]
      EmbellishmentLevel:    [statement]                    # turmeric will stain heavy work
      ColorTemperature:      [cool]
    notes: >
      Pre-wedding turmeric ceremony. Yellow / mustard / marigold dominant.
      Female: yellow lehenga, mustard kurti + dhoti pant, gota-patti
      yellow saree, simple anarkali. Male: yellow / cream kurta-pyjama,
      bandi. NOTHING that turmeric stains will ruin.

  mehndi:
    archetype: wedding_vibes
    formality: semi_formal
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal, ceremonial]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive, evening]
      FabricTexture:         [embroidered, sheen, metallic]
      EmbellishmentLevel:    [moderate, heavy, statement]
      EmbellishmentType:     [mirror_work, embroidery, applique, beading]
      ColorTemperature:      [warm]
      PrimaryColor:          [green, mehendi green, lime, mustard, orange]
    avoid:
      FormalityLevel:        [casual]
      EmbellishmentType:     [distressing, studs]
      ColorTemperature:      [cool]
    notes: >
      Henna ceremony. Green / yellow / mustard / orange dominant
      (green most traditional). Mirror-work chaniya choli (Gujarati),
      embellished sharara, lehenga in mehendi-green or mustard, kurta-
      sharara set. Loud color, loud embroidery, heavy-mid jewellery.

  sangeet:
    archetype: wedding_vibes
    formality: ceremonial
    time: evening
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [semi_formal, formal, ceremonial]
      FormalitySignalStrength: [high, very_high]
      OccasionFit:           [festive, traditional, party]
      OccasionSignal:        [festive, evening, party]
      TimeOfDay:             [evening]
      FabricTexture:         [embroidered, sheen, metallic]
      FabricWeight:          [medium, heavy]
      EmbellishmentLevel:    [moderate, heavy, statement]
      EmbellishmentType:     [sequins, beading, mirror_work, embroidery]
      ColorValue:            [mid, dark, very_dark]
      ColorSaturation:       [high, very_high]
    avoid:
      FormalityLevel:        [casual, smart_casual]
      OccasionFit:           [casual, workwear]
      EmbellishmentLevel:    [none, minimal]
    notes: >
      Music night — most fashion-forward of the wedding events. Heavily
      embellished lehenga (Sabyasachi, Manish Malhotra), designer saree
      with statement blouse, bandhgala / fully embellished sherwani,
      Indo-Western jumpsuit. Statement jewellery, festive evening
      palette. Fashion show energy.

  baraat:
    archetype: wedding_vibes
    formality: ceremonial
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [ceremonial]
      FormalitySignalStrength: [very_high]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive]
      FabricTexture:         [embroidered, metallic, sheen]
      FabricWeight:          [heavy]
      EmbellishmentLevel:    [heavy, statement]
      EmbellishmentType:     [embroidery, beading, sequins, mirror_work]
      ColorValue:            [mid, dark, very_dark]
      ColorSaturation:       [high, very_high]
    avoid:
      FormalityLevel:        [casual, smart_casual, semi_formal]
      OccasionFit:           [casual, workwear]
      EmbellishmentLevel:    [none, minimal, subtle]
    notes: >
      Groom's procession to bride's home. Groom: full sherwani with
      heavy zardozi, mojari shoes, sehra (turban with veil). Family/
      friends: heavy lehenga, embellished saree, banarasi kanjeevaram.
      Statement-level outfit.

  wedding_ceremony:
    archetype: wedding_vibes
    formality: ceremonial
    time: daytime
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [ceremonial]
      FormalitySignalStrength: [very_high]
      OccasionFit:           [traditional, festive]
      OccasionSignal:        [festive]
      FabricTexture:         [embroidered, sheen, metallic]
      FabricWeight:          [medium, heavy]
      EmbellishmentLevel:    [heavy, statement]
      EmbellishmentType:     [embroidery, beading, sequins, mirror_work, applique]
      ColorValue:            [mid, dark, very_dark]
      ColorSaturation:       [high, very_high]
    avoid:
      FormalityLevel:        [casual, smart_casual, semi_formal]
      EmbellishmentLevel:    [none, minimal, subtle]
    notes: >
      Main ceremony (pheras / agni / vows). For BRIDE: red/maroon/
      bridal-pink lehenga or Banarasi/Kanjeevaram saree, full bridal
      jewellery. For GROOM: heavily embroidered sherwani / bandhgala
      with sehra. For GUESTS: ceremonial silk saree, lehenga, full
      sherwani. THE most heavily-embellished outfit context in Indian
      fashion.

  wedding_reception:
    archetype: wedding_vibes
    formality: ceremonial
    time: evening
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [formal, ceremonial]
      FormalitySignalStrength: [very_high]
      OccasionFit:           [festive, traditional, formal, party]
      OccasionSignal:        [festive, evening]
      TimeOfDay:             [evening]
      FabricTexture:         [embroidered, sheen, metallic]
      FabricWeight:          [medium, heavy]
      EmbellishmentLevel:    [moderate, heavy, statement]
      EmbellishmentType:     [sequins, beading, embroidery, mirror_work]
      ColorValue:            [dark, very_dark]
      ColorSaturation:       [high, very_high]
    avoid:
      FormalityLevel:        [casual, smart_casual]
      EmbellishmentLevel:    [none, minimal]
    notes: >
      Evening reception — even more upscale than wedding ceremony in
      some communities. Bride/groom in second outfit (often more
      Western-fashion-forward — gowns, designer suits). Guests in
      formal Indian (heavy saree, lehenga) or formal Western (gown,
      suit). Fully embellished register.


# ─────────────────────────────────────────────────────────────────────────
# DATING (dating archetype)
# ─────────────────────────────────────────────────────────────────────────

  first_date:
    archetype: dating
    formality: smart_casual
    time: evening
    seasons: [spring, summer, autumn, winter]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal]
      OccasionFit:           [smart_casual, semi_formal]
      OccasionSignal:        [evening]
      TimeOfDay:             [evening]
      FabricTexture:         [smooth, sheen, knit]
      EmbellishmentLevel:    [subtle, moderate]
    avoid:
      FormalityLevel:        [casual, ceremonial]
      OccasionFit:           [festive, traditional]         # too much for first impression
      EmbellishmentLevel:    [statement]
    notes: >
      Smart casual — too casual reads disinterested, too formal reads
      tense. Indian urban: kurti + jeans + statement earring,
      structured dress + jacket, slim shirt + chino. Polished but
      relaxed.

  date_night:
    archetype: dating
    formality: smart_casual
    time: evening
