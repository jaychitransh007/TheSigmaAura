    seasons: [spring, summer]
    flatters:
      FormalityLevel:        [smart_casual, semi_formal]
      OccasionFit:           [smart_casual, casual]
      OccasionSignal:        [evening, travel]
      TimeOfDay:             [evening]
      FabricTexture:         [smooth, sheen, embroidered]
      FabricWeight:          [light]
      EmbellishmentLevel:    [subtle, moderate]
    avoid:
      FormalityLevel:        [formal, ceremonial]
      EmbellishmentLevel:    [heavy, statement]
    notes: >
      Resort evening dinner. Lightweight festive — kurti + palazzo,
      flowy sundress + statement earring, light embroidered saree,
      linen shirt + chino. Holiday-festive but not bridal-festive.


