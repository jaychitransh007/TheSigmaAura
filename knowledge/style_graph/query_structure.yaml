# Query intent → outfit structure mapping (Indian urban context)
#
# Sixth mapping table. Determines outfit structure (paired / three_piece /
# complete) given the (intent, occasion, anchor_role) tuple. Different
# shape from the other mappings — this is a dispatch table that drives
# the architect's `structure` field, not a flatters/avoid pair.
#
# Structures (from prompt/outfit_architect.md):
#   complete:    one query, role: "complete" — standalone garments
#                (kurta_set, lehenga_set, saree, anarkali, dress,
#                 jumpsuit, gown, salwar_suit, suit_set, sherwani-as-set)
#   paired:      two queries, role: "top" + role: "bottom"
#                (shirt+trouser, kurti+palazzo, blouse+skirt, kurta+pyjama)
#   three_piece: three queries, role: "top" + "bottom" + "outerwear"
#                (shirt+trouser+blazer, kurta+pyjama+nehru_jacket,
#                 blouse+skirt+jacket)
#
# For pairing_request, structure derives from the anchor garment's role —
# the anchor takes one slot and other slots fill around it.
#
# Cultural variants matter: a wedding ceremony defaults to `complete`
# (kurta_set / lehenga_set / saree) for Indian-traditional, but
# `three_piece` (gown + jacket) is valid for Western-style.
#
# Canonical garment-attribute values: ./modules/style_engine/configs/config/garment_attributes.json

query_structure:

  occasion_recommendation:
    # Each occasion lists default + alternative outfit structures.
    # `flatters` / `avoid` constrain StylingCompleteness — what kinds of
    # catalog items the architect should retrieve.

    # ── Work / Professional ───────────────────────────────────────────

    daily_office_mnc:
      default_structure: paired
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [complete]                 # complete kurta_set / saree out of MNC register
      notes: >
        Western-leaning workwear: tailored shirt + trouser, blouse +
        skirt + structured blazer (three_piece). Cotton saree is
        acceptable but rare in MNC daily — most users default to
        paired Western.

    daily_office_indian_corp:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid: {}
      notes: >
        Indian corp accepts kurta + slim trouser (paired), kurta_set
        (complete), saree (complete), and Western shirt + chino
        (paired). Three structures all work; user preference + ease.

    daily_office_startup:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid:
        StylingCompleteness: [dual_dependency]
      notes: >
        Startup dressing in urban India is relaxed but increasingly
        style-aware. Tee + jeans, oversized shirt + trouser, kurti +
        denim, elevated co-ord sets, jumpsuits, and minimalist dresses
        all work. Avoid highly formal suiting or ceremonial complete
        silhouettes.

    formal_office:
      default_structure: three_piece
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [complete]
      notes: Suit / pantsuit / structured bandhgala over kurta. Jacket-
        forward. Saree (complete) acceptable for Indian-corp formal
        events.

    business_meeting:
      default_structure: three_piece
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid: {}
      notes: Three-piece preferred — adds gravitas. Tailored sherwani,
        bandhgala over kurta, blazer + saree blouse + saree.

    interview:
      default_structure: three_piece
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [complete]                 # kurta_set reads less professional
      notes: Suit, pantsuit, structured sherwani for grooms. Sober
        palette. Always structured outerwear.

    workplace_event:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid: {}
      notes: Office Diwali / Christmas — embroidered kurti + palazzo
        (paired), light anarkali (complete), structured saree
        (complete), bandi over kurta (three_piece).

    business_dinner:
      default_structure: three_piece
      alternative_structures: [complete, paired]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, dual_dependency, complete, needs_innerwear]
      avoid: {}
      notes: Tailored bandhgala, structured sherwani, silk saree, sheath
        dress + jacket. Polished evening register.


    # ── Social Casual ──────────────────────────────────────────────────

    weekend_brunch:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Tee + jeans + jacket, kurti + jeans, summer dress
        (complete), light cotton saree (complete).

    casual_lunch:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Casual paired or summer dress.

    coffee_meetup:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid:
        StylingCompleteness: [dual_dependency]
      notes: >
        Relaxed urban casual. Denim + shirt, kurti + jeans, casual
        dress, jumpsuit, or soft co-ord sets work. Avoid heavily
        ceremonial or sharply formal layering.

    everyday_casual:
      default_structure: paired
      alternative_structures: []
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Tee + chino, kurti + jeans.

    travel_day:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid:
        StylingCompleteness: [dual_dependency]
      notes: >
        Comfort-first dressing with movement and climate adaptability.
        Stretch trousers, oversized shirts, knit sets, athleisure
        co-ords, breathable jumpsuits, and wrinkle-resistant layers
        work best. Avoid ceremonial or maintenance-heavy garments.


    # ── Night Out ──────────────────────────────────────────────────────

    cocktail_party:
      default_structure: complete
      alternative_structures: [paired, three_piece]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid: {}
      notes: Cocktail dress (complete), embroidered anarkali (complete),
        sequinned saree (complete), bandhgala over kurta (three_piece),
        skirt + sequinned top (paired).

    rooftop_bar:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid: {}
      notes: >
        Fashion-forward evening dressing. Structured separates, dresses,
        jumpsuits, light layering, statement jackets, and Indo-Western
        silhouettes all work depending on venue energy.

    dinner_party:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Silk shirt + chino, kurta + slim trouser, light silk saree
        (complete), kurti + churidar (paired).

    fine_dining:
      default_structure: complete
      alternative_structures: [three_piece, paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid: {}
      notes: Silk saree, tailored bandhgala, sheath dress, structured
        anarkali. Polished register.


    # ── Formal Events ──────────────────────────────────────────────────

    gala_dinner:
      default_structure: complete
      alternative_structures: [three_piece, paired]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: >
        High-formality statement dressing. Gowns, embellished sarees,
        couture lehengas, tuxedos, bandhgalas, elevated separates, and
        fashion-forward Indo-Western layering all work when execution
        feels intentional and luxurious.

    award_ceremony:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid: {}
      notes: Same register as gala — designer outfit, statement-level
        embellishment.


    # ── Festive (Indian) ───────────────────────────────────────────────

    diwali:
      default_structure: complete
      alternative_structures: [three_piece]
      cultural_variants:
        indian_traditional: complete                   # anarkali, kurta_set, saree, lehenga_set
        indian_fusion: three_piece                     # kurta + dhoti + bandi
      flatters:
        # complete + dual_dependency for the indian_traditional default; needs_*
        # for the indian_fusion three_piece variant (kurta + dhoti + bandi).
        StylingCompleteness: [complete, dual_dependency, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid: {}                                         # all completeness types valid for at least one variant
      notes: Heavy anarkali (complete), banarasi/kanjeevaram saree
        (complete), bridal lehenga set, sherwani (complete or with
        statement bandi). Western paired separates rare for Diwali —
        the festival pulls toward traditional.

    karva_chauth:
      default_structure: complete
      alternative_structures: []
      flatters:
        StylingCompleteness: [complete]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Bridal-style traditional only. Saree (complete), lehenga_set
        (complete), heavy anarkali (complete). Almost never Western
        paired separates.

    navratri:
      default_structure: complete
      alternative_structures: [three_piece]
      cultural_variants:
        indian_traditional: complete
        indian_fusion: three_piece
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid: {}
      notes: >
        Traditional mirror-work lehenga sets remain dominant, but urban
        fusion dressing now includes jacket lehengas, crop-top + skirt +
        cape combinations, and Indo-Western layering built for Garba
        movement.

    holi:
      default_structure: paired
      alternative_structures: []
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      avoid:
        StylingCompleteness: [complete]                 # silk saree wrecked by colors
      notes: Disposable white kurta + pyjama (paired), white kurti +
        churidar (paired). Cotton only — colors stain.

    raksha_bandhan:
      default_structure: complete
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Kurta_set (complete), simple silk saree (complete), kurti
        + palazzo (paired).

    eid:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Anarkali, sharara, gharara, salwar suit (all complete).
        Sherwani for men (complete or three_piece).

    christmas:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid: {}
      notes: Western-leaning urban Christmas. Sweater + skirt (paired),
        festive dress (complete), structured sherwani (three_piece) for
        Indian families.

    dussehra:
      default_structure: complete
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Light festive — kurta_set (complete), simple silk saree
        (complete), bandi over kurta (three_piece).

    festival_lunch:
      default_structure: complete
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Generic family festival. Kurta_set, simple saree, kurti +
        palazzo.

    family_pooja:
      default_structure: complete
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Light traditional — kurta_set, simple silk saree.


    # ── Wedding Cycle ──────────────────────────────────────────────────

    roka:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Pastel anarkali (complete), embroidered saree (complete),
        sherwani (complete or three_piece). Lighter than wedding-day.

    sagai_engagement:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Lehenga_set, embellished saree, sharara, gharara, full
        sherwani — all complete. Statement outfit register.

    haldi:
      default_structure: complete
      alternative_structures: []
      flatters:
        StylingCompleteness: [complete]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Yellow lehenga_set, yellow kurti + dhoti pant (this is
        complete in Indian categorization), yellow saree. Turmeric will
        ruin paired separates with white shirts.

    mehndi:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid: {}
      notes: >
        Mirror-work lehengas, sharara sets, draped skirts, cape sets,
        jacket layering, and playful Indo-Western festive silhouettes
        work well. Movement and visual energy matter more than strict
        traditional purity.

    sangeet:
      default_structure: complete
      alternative_structures: [three_piece]
      flatters:
        StylingCompleteness: [complete, dual_dependency, needs_innerwear]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Heavily embellished lehenga (complete), designer saree
        (complete), bandhgala / sherwani (complete or three_piece),
        Indo-Western jumpsuit (complete). Maximum statement.

    baraat:
      default_structure: complete
      alternative_structures: []
      flatters:
        StylingCompleteness: [complete]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: Full ceremonial sherwani (complete with sehra), bridal-
        weight lehenga_set, banarasi saree.

    wedding_ceremony:
      default_structure: complete
      alternative_structures: [three_piece]                            # western variant
      cultural_variants:
        indian_traditional: complete                  # bridal lehenga / kanjeevaram / sherwani
        western: three_piece                          # gown + jacket OR formal suit
      flatters:
        # complete for the indian_traditional default; needs_* + dual_dependency
        # for the western three_piece variant.
        StylingCompleteness: [complete, dual_dependency, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid: {}
      notes: >
        THE most ceremonial-complete moment in Indian fashion. For
        Indian families: bridal red lehenga_set or banarasi/kanjeevaram
        saree (bride), full embroidered sherwani with sehra (groom).
        Western variant exists but rare in urban India.

    wedding_reception:
      default_structure: complete
      alternative_structures: [three_piece]
      cultural_variants:
        indian_traditional: complete
        western: complete                              # gown still complete
      flatters:
        # complete + dual_dependency for the indian_traditional default; needs_*
        # for the three_piece alternative (designer suit, structured sherwani).
        StylingCompleteness: [complete, dual_dependency, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid: {}
      notes: Even more designer-statement than wedding ceremony in some
        communities. Bride/groom in second outfit. Designer lehenga,
        gown, structured sherwani.


    # ── Dating ─────────────────────────────────────────────────────────

    first_date:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid:
        StylingCompleteness: [dual_dependency]
      notes: >
        Smart-casual with personality. Structured denim, dresses,
        lightweight layering, relaxed tailoring, and understated
        Indo-Western styling all work. Aim for approachable polish
        rather than over-formality.

    date_night:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Fitted dress (complete), kurta + slim trouser, fitted
        saree (complete) for special evenings.

    anniversary_dinner:
      default_structure: complete
      alternative_structures: [paired, three_piece]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear, dual_dependency, needs_innerwear]
      avoid: {}
      notes: Silk saree, sheath dress, tailored bandhgala — polished
        evening register.


    # ── Beach / Vacation ───────────────────────────────────────────────

    beach_day:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Top + shorts (paired), summer dress / kaftan (complete).

    vacation_dinner:
      default_structure: paired
      alternative_structures: [complete]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete]
      avoid: {}
      notes: Light kurti + palazzo (paired), summer dress (complete),
        light saree (complete).


    # ── Family / Cultural ──────────────────────────────────────────────

    in_laws_first_meeting:
      default_structure: complete
      alternative_structures: [paired, three_piece]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear, needs_innerwear]
      avoid:
        StylingCompleteness: [dual_dependency]
      notes: >
        Conservative-polished dressing with modest silhouettes. Soft
        sarees, pastel anarkalis, elegant kurta sets, refined
        Indo-Western layering, and subtle embroidery work best. Urban
        families increasingly accept refined Indo-Western layering if
        styling remains respectful.

    kitty_party:
      default_structure: complete
      alternative_structures: [paired]
      flatters:
        StylingCompleteness: [complete, needs_topwear, needs_bottomwear]
      avoid: {}
      notes: Embroidered anarkali, designer saree, statement kurta_set
        — Indian women's social. Festive without bridal-heavy.


  # ─────────────────────────────────────────────────────────────────────
  # PAIRING REQUEST — anchor-driven structure
  # ─────────────────────────────────────────────────────────────────────

  pairing_request:
    # User uploads / refers to an existing item ("anchor"). The architect
    # fills slots OTHER than the anchor's role. Structure derives from
    # the anchor's GarmentCategory rather than from occasion alone.

    anchor_top:
      default_structure: paired
      alternative_structures: [three_piece]
      fills_slots: [bottom, outerwear]
      flatters:
        # Anchor is a top (StylingCompleteness: needs_bottomwear).
        # Architect must RETRIEVE: a bottom (which carries needs_topwear)
        # + optional outerwear (needs_innerwear or dual_dependency).
        StylingCompleteness: [needs_topwear, needs_innerwear, dual_dependency]
      avoid:
        StylingCompleteness: [complete]                 # already complete = no pairing needed
      notes: >
        Anchor = top (shirt, kurta, blouse, kurti). Recipe builds
        bottom (trouser, palazzo, skirt, jeans) + optional outerwear
        (blazer, bandi, jacket). For shirt-anchor: trouser/chino +
        optional blazer. For kurta-anchor: churidar/pyjama + optional
        bandi/Nehru jacket.

    anchor_bottom:
      default_structure: paired
      alternative_structures: [three_piece]
      fills_slots: [top, outerwear]
      flatters:
        # Anchor is a bottom (StylingCompleteness: needs_topwear).
        # Architect must RETRIEVE: a top (needs_bottomwear) + optional
        # outerwear (needs_innerwear or dual_dependency).
        StylingCompleteness: [needs_bottomwear, needs_innerwear, dual_dependency]
      avoid:
        StylingCompleteness: [complete]
      notes: >
        Anchor = bottom (trouser, palazzo, skirt, jeans, churidar).
        Recipe builds top + optional outerwear. For palazzo: kurti or
        crop top. For trouser: structured shirt or kurta.

    anchor_outerwear:
      default_structure: three_piece
      alternative_structures: [paired]
      fills_slots: [top, bottom]
      flatters:
        # Anchor is outerwear (StylingCompleteness: needs_innerwear).
        # Architect must RETRIEVE: top (needs_bottomwear) + bottom
        # (needs_topwear). needs_innerwear is the anchor's own type — not
        # a fill target.
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      avoid:
        StylingCompleteness: [complete]
      notes: >
        Anchor = jacket / blazer / bandhgala / bandi / cardigan / coat.
        Recipe fills top + bottom that work as a unit underneath. For
        bandhgala: white shirt + slim trouser. For bandi: kurta +
        churidar.

    anchor_complete:
      default_structure: complete
      alternative_structures: [three_piece]
      fills_slots: [outerwear]
      flatters:
        StylingCompleteness: [complete, needs_innerwear]
      avoid:
        StylingCompleteness: [needs_topwear, needs_bottomwear]
      notes: >
        Anchor is itself complete (saree, kurta_set, lehenga_set, dress,
        gown, jumpsuit, sherwani-as-set, anarkali, salwar_suit). Complete
        anchors primarily require styling augmentation rather than
        reconstruction — optional layering pieces such as jackets,
        shrugs, capes, belts, or bandhgalas may be added when
        aesthetically compatible. Architect can still emit accessory
        recommendations (jewellery, dupatta replacement, footwear)
        when no compatible outerwear exists.


  # ─────────────────────────────────────────────────────────────────────
  # FALLBACKS — generic when no specific occasion/anchor matches
  # ─────────────────────────────────────────────────────────────────────

  fallback:
    # Used when the (intent, occasion) combination doesn't match any
    # specific entry. Leans toward the most flexible option.

    default:
      default_structure: paired
      alternative_structures: [complete, three_piece]
      flatters:
        StylingCompleteness: [needs_topwear, needs_bottomwear, complete, needs_innerwear]
      avoid: {}
      notes: When in doubt, default to paired. Most occasions accept
        it; specialized occasions get explicit rules above.
