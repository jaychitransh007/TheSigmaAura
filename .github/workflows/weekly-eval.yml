name: Weekly L0 Smoke

# May 1, 2026: trimmed to a weekly L0 smoke against `main`. The
# previous L1 / L3 / L4 / Release Gate jobs all referenced scripts
# deleted in earlier repo cleanup ("Consolidate agentic runtime and
# cleanup legacy stack" — a17978d) and have failed every run since
# April 7, 2026. Keeping the cron schedule live so an import-time
# regression on `main` is still caught weekly. When the agent-eval +
# release-gate + conversation-eval scripts get re-introduced, restore
# the corresponding jobs from the commit that adds them — git history
# preserves the previous shape.

on:
  schedule:
    - cron: "0 6 * * 1"  # 6:00 AM UTC every Monday
  workflow_dispatch:

jobs:
  smoke:
    name: L0 Unit Tests (Weekly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests (L0)
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
