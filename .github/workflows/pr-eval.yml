name: PR Eval (L0)

# May 1, 2026: trimmed to L0 only. The previous L1 Per-Agent Evals
# and Release Gate Check jobs referenced scripts deleted in earlier
# repo cleanup ("Consolidate agentic runtime and cleanup legacy stack"
# — a17978d). The orphaned jobs failed every run; this is the first
# PR ever opened against the repo so the regression had never been
# observed before. When the agent-eval + release-gate scripts get
# re-introduced, restore the corresponding jobs from the commit that
# adds them — git history has the previous shape preserved.

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: L0 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
