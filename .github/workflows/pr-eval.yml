name: PR Eval (L0 + L1)

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: L0 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

  agent-evals:
    name: L1 Per-Agent Evals
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run per-agent evals
        run: |
          python ops/scripts/run_agent_evals.py \
            --suite-dir ops/evals/agents \
            --out-dir data/logs/agent_evals/pr-${{ github.run_id }} \
            --fail-on-gate
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-artifacts-pr
          path: data/logs/agent_evals/pr-${{ github.run_id }}/
          retention-days: 30

  release-gate:
    name: Release Gate Check
    runs-on: ubuntu-latest
    needs: [unit-tests, agent-evals]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run release gate
        run: |
          python ops/scripts/run_release_gate.py \
            --eval-dir data/logs/agent_evals/pr-${{ github.run_id }} \
            --fail-on-block
