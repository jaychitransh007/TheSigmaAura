alert: aura_architect_p95_latency_high
description: |
  Outfit architect (gpt-5.4) p95 latency above 10s for 15 minutes.
  Indicates the LLM provider is slow or the prompt/payload size has
  grown unexpectedly.
expr: |
  histogram_quantile(
    0.95,
    sum(rate(aura_turn_duration_seconds_bucket{stage="outfit_architect"}[5m]))
    by (le)
  ) > 10
for: 15m
severity: P2
runbook: docs/OPERATIONS.md#a-empty-response-spike
panel: docs/OPERATIONS.md
labels:
  team: aura
  service: agentic_application
annotations:
  summary: Architect p95 latency exceeds 10s
  description: "p95 = {{ $value }}s; consider enabling AURA_DISABLE_ARCHITECT escape hatch"
