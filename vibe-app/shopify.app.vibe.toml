# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "937540a1df123dfcd486426ede2b3722"
name = "Vibe"
application_url = "https://vibe-app-five.vercel.app"
embedded = true

[webhooks]
# Matches ApiVersion.April26 in app/shopify.server.ts. Bump both together
# when the installed @shopify/shopify-api package supports a newer version.
api_version = "2026-04"

# GDPR / privacy-compliance webhooks (D.S.4) — mandatory for App Store
# distribution. Shopify fires these whenever a customer requests data
# export / deletion, or when a shop has been uninstalled long enough
# (~48h) that we must wipe its data. Each URL hits a corresponding
# Remix route under app/routes/webhooks.*.tsx; handlers validate HMAC
# via `authenticate.webhook` and respond 200 within the 5s budget.
# The actual data work runs out-of-band (logged for now; engine
# pipeline lands separately — see OPEN_TASKS.md "GDPR data pipeline").
[webhooks.privacy_compliance]
customer_data_request_url = "https://vibe-app-five.vercel.app/webhooks/customers/data_request"
customer_deletion_url = "https://vibe-app-five.vercel.app/webhooks/customers/redact"
shop_deletion_url = "https://vibe-app-five.vercel.app/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [ "https://vibe-app-five.vercel.app/auth/callback" ]

# App Proxy: customer-facing routes under thesigmavibe.shop/apps/vibe/* are
# forwarded by Shopify to this app's Remix backend at <url>/<path>.
# The `url` MUST equal the customer-facing path so server and client see the
# same URL — otherwise Remix's client router hydrates with a path that has
# no route file (404 on hard reload). Shopify signs every request; the
# apps.vibe.*.tsx routes validate via authenticate.public.appProxy().
[app_proxy]
url = "https://vibe-app-five.vercel.app/apps/vibe"
subpath = "vibe"
prefix = "apps"

[build]
# False because we deploy to Vercel directly. `shopify app deploy` pushes
# the URLs above to Partner Dashboard. If you ever want to use
# `shopify app dev` for local tunnel-based work again, flip this to true
# and the CLI will overwrite the URLs on each dev start.
automatically_update_urls_on_dev = false
