# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "937540a1df123dfcd486426ede2b3722"
name = "Vibe"
application_url = "https://vibe-app-five.vercel.app"
embedded = true

[webhooks]
# Matches ApiVersion.April26 in app/shopify.server.ts. Bump both together
# when the installed @shopify/shopify-api package supports a newer version.
api_version = "2026-04"

# GDPR / privacy-compliance webhooks (D.S.4) — mandatory for App Store
# distribution. Shopify fires these whenever a customer requests data
# export / deletion, or when a shop has been uninstalled long enough
# (~48h) that we must wipe its data. Each URL hits a corresponding
# Remix route under app/routes/webhooks.*.tsx; handlers validate HMAC
# via `authenticate.webhook` and respond 200 within the 5s budget.
# The actual data work runs out-of-band (logged for now; engine
# pipeline lands separately — see OPEN_TASKS.md "GDPR data pipeline").
[webhooks.privacy_compliance]
customer_data_request_url = "https://vibe-app-five.vercel.app/webhooks/customers/data_request"
customer_deletion_url = "https://vibe-app-five.vercel.app/webhooks/customers/redact"
shop_deletion_url = "https://vibe-app-five.vercel.app/webhooks/shop/redact"

# F.4: product lifecycle webhooks. Keep Vibe's catalog in sync with
# Shopify in near-real-time so recommendations don't surface
# out-of-stock or deleted items.
#
# We forward the raw Shopify payload to the engine (which translates
# to the internal BootstrapProductInput shape). Handlers stay <5s by
# offloading the HTTP call to the engine; the engine does the LLM
# work async via the F.3 daily cron's enrichment poll.
[[webhooks.subscriptions]]
topics = [ "products/create", "products/update" ]
uri = "https://vibe-app-five.vercel.app/webhooks/products/upsert"

[[webhooks.subscriptions]]
topics = [ "products/delete" ]
uri = "https://vibe-app-five.vercel.app/webhooks/products/delete"

# PR #478: theme settings inheritance. Re-read the merchant's active
# theme settings whenever they publish a new theme or change the
# current one — keeps Vibe's font + accent color aligned with the
# host store. read_themes scope grants access.
[[webhooks.subscriptions]]
topics = [ "themes/update" ]
uri = "https://vibe-app-five.vercel.app/webhooks/themes/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
#
# Five scopes (F.1, 2026-05-17). Each is load-bearing for a specific
# downstream feature — keep this list minimal so the install consent
# screen stays trustable:
#
#   read_products    — F.2 catalog sync (Vibe recommends from the
#                      merchant's actual Shopify catalog)
#   read_inventory   — F.4 stock-aware retrieval (no OOS recs)
#   read_orders      — G.1 order webhooks for purchase attribution
#   read_customers   — G.2 link orders to engine external_user_id
#   read_themes      — D.M.3 verify Theme App Extension placement
#
# `write_metafields` is NOT a valid Shopify scope — metafields inherit
# their parent resource's scope (write_orders would let us tag orders,
# but that scope is too broad: it also allows refunds + cancellations).
# We hold attribution metadata in Vibe's own `order_attribution`
# Prisma table instead, so order writes aren't needed.
#
# `write_products` (the bootstrap template's default) was dropped —
# Vibe never writes to products.
#
# Updating this list forces existing installs to re-grant on next
# admin load. See docs/runbooks/F1_scope_reinstall.md for the
# operator-side procedure when this changes.
scopes = "read_products,read_inventory,read_orders,read_customers,read_themes,write_navigation"

[auth]
redirect_urls = [ "https://vibe-app-five.vercel.app/auth/callback" ]

# App Proxy: customer-facing routes under thesigmavibe.shop/apps/vibe/* are
# forwarded by Shopify to this app's Remix backend at <url>/<path>.
# The `url` MUST equal the customer-facing path so server and client see the
# same URL — otherwise Remix's client router hydrates with a path that has
# no route file (404 on hard reload). Shopify signs every request; the
# apps.vibe.*.tsx routes validate via authenticate.public.appProxy().
[app_proxy]
url = "https://vibe-app-five.vercel.app/apps/vibe"
subpath = "vibe"
prefix = "apps"

[build]
# False because we deploy to Vercel directly. `shopify app deploy` pushes
# the URLs above to Partner Dashboard. If you ever want to use
# `shopify app dev` for local tunnel-based work again, flip this to true
# and the CLI will overwrite the URLs on each dev start.
automatically_update_urls_on_dev = false
